<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pré-Sinais SulBR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-primary">🌦️ Painel de Monitoramento - SulBR</h1>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">1. Status do Servidor</h5>
                        <p class="text-muted small">Verifica se a sua API Node.js está online.</p>
                        <button class="btn btn-success" onclick="verificarSaude()">Testar Conexão</button>
                        <p id="status-api" class="mt-3 mb-0 text-muted">Aguardando teste...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">2. Banco de Dados</h5>
                        <p class="text-muted small">Listar todas as estações meteorológicas.</p>
                        <button class="btn btn-info text-white" onclick="buscarDados()">Visualizar Estações</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mt-3" id="area-resultados" style="display: none;">
            <div class="card-header bg-dark text-white d-flex justify-content-between">
                <span>Resultados da API</span>
                <span class="badge bg-secondary">JSON Real</span>
            </div>
            <div class="card-body p-0">
                <pre id="visor-dados" class="m-0 p-3 bg-dark text-info border-0" style="max-height: 400px; overflow-y: auto; font-family: monospace;"></pre>
            </div>
        </div>
    </div>

    <script>
        async function verificarSaude() {
            const statusElement = document.getElementById('status-api');
            try {
                const resposta = await fetch('http://localhost:3000/api/health');
                const dados = await resposta.json();
                statusElement.innerHTML = `✅ API Online! Status: ${dados.status} <br><small>${dados.timestamp}</small>`;
                statusElement.className = "mt-3 mb-0 text-success fw-bold";
            } catch (erro) {
                statusElement.innerHTML = "❌ Erro de conexão. O servidor está rodando?";
                statusElement.className = "mt-3 mb-0 text-danger fw-bold";
            }
        }

        async function buscarDados() {
            const visor = document.getElementById('visor-dados');
            document.getElementById('area-resultados').style.display = "block";
            visor.textContent = "Buscando estações no banco de dados...";
            visor.className = "m-0 p-3 bg-dark text-info border-0";

            try {
                const resposta = await fetch('http://localhost:3000/api/estacoes');
                const dados = await resposta.json();
                
                if (dados.length === 0) {
                    visor.textContent = "// O banco de dados está conectado, mas a tabela de estações está vazia.";
                } else {
                    visor.textContent = JSON.stringify(dados, null, 2);
                }
            } catch (erro) {
                visor.textContent = "⚠️ Erro ao acessar a rota /api/estacoes. Verifique o servidor.";
                visor.className = "m-0 p-3 bg-dark text-danger border-0";
            }
        }
    </script>
</body>
</html>
